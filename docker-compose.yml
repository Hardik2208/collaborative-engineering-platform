services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: collab_engineering
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "3000:3000"

volumes:
  postgres_data: